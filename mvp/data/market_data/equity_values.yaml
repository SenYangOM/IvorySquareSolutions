# Fiscal-year-end market values of equity for the 5 Phase 1 sample issuers.
# Canonical values sourced from BUILD_REFS.md §2 (gathered 2026-04-17). This
# file is an engineering-owned data fixture, NOT a human_layer artifact — an
# accounting expert reviewing M-Score / Altman Z outputs would not edit these
# share counts or prices (see CLAUDE.md §P1, mvp_build_goal.md §9).
#
# The Altman Z skill (compute_altman_z_score) reads this fixture for X4's
# numerator (market value of equity). Validated at load time by
# mvp.ingestion.market_data_loader.load_equity_values — in particular, the
# consistency check
#     shares_outstanding * share_price_usd ≈ market_value_of_equity_usd
# (within 1% tolerance) catches typos before they propagate to Phase 4.

entries:
  - cik: "0001024401"
    issuer: "Enron Corp"
    fiscal_year_end: "2000-12-31"
    shares_outstanding: 751628046
    share_price_usd: 83.13
    market_value_of_equity_usd: 62482858862
    price_source: "https://en.wikipedia.org/wiki/Enron_scandal"
    shares_source: "Enron FY2000 10-K balance sheet (752,205,112 issued − 577,066 treasury = 751,628,046 outstanding)"
    notes: >
      $83.13 is the close on 2000-12-29 (last NYSE trading day of FY2000;
      Dec 30-31 were a weekend). Widely-cited figure, predates the November
      2001 collapse by 11 months. 751.6M × $83.13 ≈ $62.5B, consistent with
      contemporary press coverage 'market cap exceeded $60B at year-end
      2000'. Uses as-originally-filed FY2000 10-K numbers per §13 decision 3.

  - cik: "0000723527"
    issuer: "WorldCom Inc"
    fiscal_year_end: "2001-12-31"
    shares_outstanding: 3086032391
    share_price_usd: 14.04
    market_value_of_equity_usd: 43350000000
    price_source: "https://companiesmarketcap.com/worldcom/marketcap/"
    shares_source: "WorldCom FY2001 10-K balance sheet (WCOM: 2,967,436,680 + MCIT: 118,595,711 = 3,086,032,391 combined tracking-stock shares)"
    market_cap_source: "estimated_from_aggregated_market_cap"
    notes: >
      WorldCom's June 2001 recapitalization created two tracking stocks
      (WCOM and MCIT); Yahoo Finance chart API drops delisted tickers so
      direct close-price data is unavailable. Using the companiesmarketcap
      year-end-2001 aggregate ($43.33B) as the MVE proxy; implied blended
      price ≈ $14.04/share is consistent with the 10-K's Item 5 quarterly
      range (WCOM Q4 2001 $11.79–$16.06; MCIT Q4 2001 $10.90–$15.40). This
      record is flagged `market_cap_source: estimated_from_aggregated_market_cap`
      in addition to the standard sources — downstream confidence scoring
      should degrade accordingly. As-originally-filed FY2001 10-K numbers
      (pre the 2004 restatement) per §13 decision 3.

