      Carvana's ~$8B of book debt is very low, consistent with the gray-
      zone profile in mvp_build_goal.md §4. Cover-page share count is
      reported as of 2023-02-17 (47 days post-FYE) — flagged
      `shares_source_flag: cover_page_post_fye`.
