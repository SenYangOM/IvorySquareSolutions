  - cik: "0001690820"
    issuer: "Carvana Co"
    fiscal_year_end: "2022-12-31"
    shares_outstanding: 106074230
    share_price_usd: 4.74
    market_value_of_equity_usd: 502791850
    price_source: "https://query1.finance.yahoo.com/v8/finance/chart/CVNA?period1=1672185600&period2=1672790400&interval=1d"
    shares_source: "Carvana FY2022 10-K cover page, Class A common stock (as of February 17, 2023)"
    shares_source_flag: "cover_page_post_fye"
    notes: >
      $4.74 is the close on 2022-12-30, last NYSE trading day of FY2022
