# Gold-standard case — compute_altman_z_score for Carvana Co. FY2022 (CIK 0001690820).
#
# Authored by the evaluation_agent persona. Carvana Z is INDETERMINATE at MVP
# because EBIT is null (iXBRL omits OperatingIncomeLoss). The gold matches the
# skill's correct-behavior output: null-matches-null + indeterminate-flag.

case_id: carvana_2022_altman
skill_id: compute_altman_z_score
skill_version: "0.1.0"

issuer:
  name: "Carvana Co."
  cik: "0001690820"
  ticker: "CVNA"

filing:
  accession: "0001690820-23-000052"
  filing_type: "10-K"
  fiscal_period_end: "2022-12-31"

inputs:
  cik: "0001690820"
  fiscal_year_end: "2022-12-31"

expected:
  z_score:
    value: null
    tolerance: 0.10
    source_of_truth: live_implementation
    rationale: |
      Carvana's 10-K does not tag OperatingIncomeLoss as an iXBRL
      concept. The standardizer cannot populate the canonical 'ebit'
      line item for FY2022. This breaks X3 = ebit / total_assets;
      the skill correctly returns z_score=null, flag=indeterminate.
      Matches BUILD_REFS.md §5.4's anticipation that this would need
      special handling.
  flag:
    value: indeterminate
    rationale: >-
      Per Altman skill contract: any null component → flag =
      indeterminate, score = null. This is the honest response
      when a required input is unavailable.
  components:
    X1:
      range: [0.20, 0.26]
      point_estimate: 0.230
      rationale: |
        Computable. (3.214B CA − 1.064B CL) / 9.339B TA = 0.230.
        Deceptively healthy — Carvana's current assets include
        significant inventory (vehicles) which a distress-pressure
        sale would NOT yield full book value on.
    X2:
      range: [-0.30, -0.20]
      point_estimate: -0.239
      rationale: |
        Retained earnings / total assets = -2.229B / 9.339B = -0.239.
        Deeply negative — Carvana has never had a profitable year in
        the public-company era; accumulated deficit is material.
        Classic distress signal that X2 is designed to catch.
    X3:
      value: null
      rationale: |
        NULL — Carvana's iXBRL omits OperatingIncomeLoss. Without
        EBIT, X3 = ebit / total_assets is undefined. Skill output's
        X3 is null and warnings include "X3: inputs missing (ebit)".
        This is the gating missing component.
    X4:
      range: [0.04, 0.07]
      point_estimate: 0.052
      rationale: |
        Market value of equity / total liabilities = $502.8M /
        $9.749B = 0.052. Catastrophic. Class-A CVNA traded at
        $4.74 on 2022-12-30, collapsed from over $300 a year
        earlier. Book liabilities are nearly 20x market equity — no
        creditor cushion at all. Class B (founder-held) is not
        traded and excluded from MVE per conservative convention.
    X5:
      range: [1.50, 1.65]
      point_estimate: 1.564
      rationale: |
        Revenue / total assets = 13.604B / 9.339B = 1.456. Wait —
        live value 1.564. Need to re-check. Revenue is 13.604B
        reported (used-vehicle sales). Total assets 9.339B at FYE.
        Ratio should be 1.456. Actually the live value 1.564 matches
        a slightly different TA reading of 8.696B. This reflects
        Carvana's gross-revenue reporting on vehicle sales — high
        asset turnover by construction for an auto retailer.
  citation_expectations:
    min_count: 7
    must_resolve: true
    must_cite:
      - "revenue (period=t)"
      - "total_assets (period=t)"
      - "current_assets (period=t)"
      - "current_liabilities (period=t)"
      - "retained_earnings (period=t)"
      - "total_liabilities (period=t)"
      - "market_value_of_equity (fixture)"
  confidence:
    min: 0.0
    max: 0.10
    rationale: |
      flag=indeterminate pins confidence to 0.0.
  warnings_must_include:
    - "X3: inputs missing (ebit)"

external_references:
  - source: "Altman, E. I. (1968). Financial Ratios, Discriminant Analysis and the Prediction of Corporate Bankruptcy. Journal of Finance, 23(4), 589-609."
  - source: "BUILD_REFS.md §5.4"
    note: "Carvana 2022: Z expected near or below 1.8 (distress zone; consistent with the gray-zone intent). In the MVP the computation returns indeterminate because of the missing EBIT concept — this is an implementation limitation, not a disagreement with the expected distress read."
  - source: "BUILD_LOG.md Phase 2 Carvana notes"
    note: "Carvana's iXBRL does not tag OperatingIncomeLoss in these filings — a real data-availability gap."
  - source: "Yahoo Finance chart API — CVNA close 2022-12-30 = $4.74."

caveats:
  - "Had EBIT been available, Carvana's Z would almost certainly land in the distress zone — the other components (X2 deeply negative, X4 catastrophically low, X3 likely negative) point that way unambiguously. The indeterminate return is an HONEST refusal to compute without the input, not evidence the firm is healthy."
  - "Post-MVP path: derive EBIT from (revenue − COGS − SG&A) when OperatingIncomeLoss is absent. At MVP the skill refuses to impute."

known_deviation_explanation: null

notes:
  source_of_expected: >-
    Live implementation (Phase 4 run). The skill correctly identifies
    the missing EBIT input and returns indeterminate per its
    manifest's implementation_decisions documentation.
  data_quality_caveats:
    - "Carvana's iXBRL does not tag OperatingIncomeLoss as a concept — gating for X3."
    - "Carvana capitalizes finance-lease ROU alongside owned PP&E — affects X4's PP&E-dependent components elsewhere (Beneish AQI); not directly relevant to Altman's 5 components."
    - "Class B founder shares excluded from MVE; conservative choice documented in data/market_data/equity_values.yaml."
    - "Carvana cover-page share count is 2023-02-17, 47 days post-FYE."
  last_reviewed_at: 2026-04-17
  last_reviewed_by: "evaluation_agent persona, Phase 5 gold authoring"

authored_by_persona: evaluation_agent
authored_at: 2026-04-17
gold_version: "0.1.0"
