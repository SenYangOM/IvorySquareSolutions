# Gold-standard case — compute_altman_z_score for WorldCom FY2001 (CIK 0000723527).
#
# Authored by the evaluation_agent persona per mvp/human_layer/gold_authoring_guide.md.
# WorldCom is the clean-positive case for Altman Z: distress zone, which is
# entirely correct given the Chapter 11 filing in July 2002.

case_id: worldcom_2001_altman
skill_id: compute_altman_z_score
skill_version: "0.1.0"

issuer:
  name: "WorldCom Inc. (MCI Inc.)"
  cik: "0000723527"
  ticker: "WCOM/MCIT"

filing:
  accession: "0001005477-02-001226"
  filing_type: "10-K405"
  fiscal_period_end: "2001-12-31"

inputs:
  cik: "0000723527"
  fiscal_year_end: "2001-12-31"

expected:
  z_score:
    value: 1.102
    tolerance: 0.10
    source_of_truth: live_implementation
    rationale: |
      Phase 4 live run: Z = 1.101635, flag = distress. Matches
      BUILD_REFS.md §5.4's "WorldCom 2001: Z ≈ 1.3-1.5 (distress
      zone)" — live value slightly below the reference band, but
      still firmly in the distress zone (Z < 1.81) so the flag
      agrees. Difference is likely the market-cap estimation: our
      fixture uses companiesmarketcap.com's $43.33B aggregate figure,
      while the BUILD_REFS band probably references earlier traded-
      tracking-stock quotes pre-delisting.
  flag:
    value: distress
    rationale: >-
      Z = 1.10 < 1.81 — distress zone. WorldCom filed Chapter 11 on
      2002-07-21, seven months after this fiscal year-end. The model
      flags this correctly; the distress is REAL (not a false
      positive), unlike Enron's grey-zone reading which is compressed
      by as-filed-liability understatement.
  components:
    X1:
      range: [-0.02, 0.02]
      point_estimate: -0.00005
      rationale: |
        Working capital essentially zero: (9.033B CA − 9.038B CL) /
        103.914B TA ≈ 0. WorldCom ran thin liquidity throughout 2001
        — current liabilities exceed current assets in most quarterly
        snapshots.
    X2:
      range: [0.02, 0.07]
      point_estimate: 0.042
      rationale: |
        Retained earnings / total assets = 4.400B / 103.914B = 0.042.
        Low cumulative profitability. WorldCom's aggressive
        acquisition strategy (MCI, Sprint attempt) grew the asset
        base faster than retained earnings.
    X3:
      range: [0.01, 0.06]
      point_estimate: 0.034
      rationale: |
        EBIT / total assets = 3.513B / 103.914B = 0.034. Thin
        operating productivity. Note: this EBIT IS pre-restatement;
        the restated figure would be materially lower since ~$3.8B of
        capitalized line costs should have been expensed, pushing
        EBIT and hence X3 negative.
    X4:
      range: [0.85, 1.15]
      point_estimate: 0.988
      rationale: |
        Market value of equity / total liabilities = $43.33B / $43.87B
        = 0.988. Market cap approximately equal to book liabilities
        — a classic distress signal. The market was pricing WorldCom
        with virtually no asset cushion over creditor claims.
    X5:
      range: [0.30, 0.40]
      point_estimate: 0.339
      rationale: |
        Revenue / total assets = 35.179B / 103.914B = 0.339. Low
        asset turnover — WorldCom's asset base was bloated by
        acquisition goodwill and capitalized operating costs. Again:
        under restatement the denominator would be smaller (fraudulent
        capex reversed) and X5 higher.
  citation_expectations:
    min_count: 8
    must_resolve: true
    must_cite:
      - "revenue (period=t)"
      - "total_assets (period=t)"
      - "current_assets (period=t)"
      - "current_liabilities (period=t)"
      - "retained_earnings (period=t)"
      - "ebit (period=t)"
      - "total_liabilities (period=t)"
      - "market_value_of_equity (fixture)"
  confidence:
    min: 0.0
    max: 0.30
    rationale: |
      Pre-iXBRL + market-cap-estimated both fire. Live value 0.15.
  warnings_must_include:
    - "pre_ixbrl_manual_extraction"
    - "market_value_estimated"

external_references:
  - source: "Altman, E. I. (1968). Financial Ratios, Discriminant Analysis and the Prediction of Corporate Bankruptcy. Journal of Finance, 23(4), 589-609."
  - source: "BUILD_REFS.md §5.4"
    note: "WorldCom 2001: Z ≈ 1.3-1.5 (distress zone). Live value 1.10 is slightly below this band but in the same zone."
  - source: "companiesmarketcap.com — WorldCom aggregate year-end-2001 market cap $43.33B."
    note: "Used because Yahoo Finance dropped WCOM/MCIT tickers after 2002-07 delisting."
  - source: "SEC Litigation Release 18147 (2003-05-19) — WorldCom fraud complaint."

caveats:
  - "Market value of equity is an aggregate estimate (companiesmarketcap.com's $43.33B figure), not a shares × price calculation. X4 is correspondingly noisier — the 'market_value_estimated' warning fires."
  - "As-filed (pre-2004 restatement) numbers. Restatement would push EBIT and PP&E down, X5 up, Z likely to similar distress magnitude. MVP doctrine: use as-filed per §13 decision 3."

known_deviation_explanation: null

notes:
  source_of_expected: >-
    Live implementation (Phase 4 run). BUILD_REFS.md §5.4's
    "Z ≈ 1.3-1.5" band is a broader historical reference; live
    1.10 is below this but correctly in distress zone — flag agrees.
  data_quality_caveats:
    - "Pre-iXBRL SGML; all 7 Altman inputs sourced from manual-extraction YAML."
    - "Market cap $43.33B is an aggregate estimate across both tracking stocks (WCOM + MCIT)."
    - "Share count 2,967,436,680 (WCOM) + 118,595,711 (MCIT) = 3,086,032,391 tracking-stock shares."
    - "Altman 1968 sample was manufacturing; WorldCom is telecom services — known extrapolation."
  last_reviewed_at: 2026-04-17
  last_reviewed_by: "evaluation_agent persona, Phase 5 gold authoring"

authored_by_persona: evaluation_agent
authored_at: 2026-04-17
gold_version: "0.1.0"
