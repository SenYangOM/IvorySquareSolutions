# Gold-standard case — compute_beneish_m_score for Microsoft Corp. FY2023 (CIK 0000789019).
#
# Authored by the evaluation_agent persona per mvp/human_layer/gold_authoring_guide.md.
# Anchored to Phase 4 live-run value and Microsoft's steady-large-cap profile.

case_id: microsoft_2023_beneish
skill_id: compute_beneish_m_score
skill_version: "0.1.0"

issuer:
  name: "Microsoft Corporation"
  cik: "0000789019"
  ticker: "MSFT"

filing:
  accession: "0000950170-23-035122"
  filing_type: "10-K"
  fiscal_period_end: "2023-06-30"
  prior_year_accession: "0001564590-22-026876"
  prior_year_fiscal_period_end: "2022-06-30"

inputs:
  cik: "0000789019"
  fiscal_year_end: "2023-06-30"
  use_restated_if_available: false

expected:
  m_score:
    value: -2.430
    tolerance: 0.10
    source_of_truth: live_implementation
    rationale: |
      Live Phase 4 run yielded M = -2.429741. Firmly below the -1.78
      threshold — Microsoft is a clean negative control. Value lands
      in the center of BUILD_REFS.md §4.4's expected "-2.5 to -3.5"
      band for steady modern large-caps.
  flag:
    value: manipulator_unlikely
    rationale: >-
      M = -2.43 is below -1.78 by 0.65. Strong clean-control signal.
  components:
    DSRI:
      range: [0.95, 1.10]
      point_estimate: 1.03
      rationale: |
        Modest receivables growth (48.7B → 48.7B relative to rising
        revenue — actually DSRI slightly above 1 because revenue grew
        only 7%). Within the 0.9-1.1 low band. Enterprise SaaS
        contracts have long invoicing cycles, keeping DSRI near 1.
    GMI:
      range: [0.95, 1.05]
      point_estimate: 0.99
      rationale: |
        Gross margin roughly flat year-over-year (68.4% → 69.0%) —
        slight expansion as Azure infrastructure leverage builds.
        GMI ~0.99 — no margin deterioration signal.
    AQI:
      range: [0.90, 1.05]
      point_estimate: 0.97
      rationale: |
        Non-current non-PP&E share unchanged — typical for a mature
        software company growing PP&E (data centers) in line with
        total assets. AQI ~0.97.
    SGI:
      range: [1.00, 1.12]
      point_estimate: 1.07
      rationale: |
        Revenue grew 6.9% — below FY2022's 18% growth rate (post-
        COVID-boom tapering). SGI ~1.07 is in the low/medium
        transition. Well below the 1.607 manipulator mean.
    DEPI:
      range: [1.25, 1.55]
      point_estimate: 1.40
      rationale: |
        DEPI ~1.40 — depreciation rate SLOWED materially between
        FY2022 and FY2023. Microsoft extended the useful life of
        server/network assets in FY2023 (disclosed Q1 FY2023: 6-year
        to 8-year useful-life change). Mechanical DEPI inflation, not
        a manipulation signal — the paper itself says DEPI is weak
        (t=0.70).  A real reviewer would read Microsoft's accounting
        policies note to confirm this is the driver, per the rule
        template's follow-up question.
    SGAI:
      range: [1.10, 1.30]
      point_estimate: 1.20
      rationale: |
        SGAI ~1.20 — S&M + G&A grew faster than revenue (hiring, AI
        investments). Insignificant coefficient in the paper.
    LVGI:
      range: [0.85, 0.98]
      point_estimate: 0.91
      rationale: |
        Leverage ticked down — Microsoft paid down some commercial
        paper in FY2023. LVGI ~0.91 in the "low" band.
    TATA:
      range: [-0.04, 0.02]
      point_estimate: -0.013
      rationale: |
        Small negative accruals — cash earnings exceeded reported
        earnings modestly. Control-sample-mean-band.
  citation_expectations:
    min_count: 20
    must_resolve: true
    must_cite:
      - "revenue (period=t)"
      - "revenue (period=t-1)"
      - "trade_receivables_net (period=t)"
      - "trade_receivables_net (period=t-1)"
      - "cost_of_goods_sold (period=t)"
      - "cost_of_goods_sold (period=t-1)"
      - "current_assets (period=t)"
      - "current_assets (period=t-1)"
      - "current_liabilities (period=t)"
      - "current_liabilities (period=t-1)"
      - "property_plant_equipment_net (period=t)"
      - "property_plant_equipment_net (period=t-1)"
      - "total_assets (period=t)"
      - "total_assets (period=t-1)"
      - "depreciation_and_amortization (period=t)"
      - "depreciation_and_amortization (period=t-1)"
      - "selling_general_admin_expense (period=t)"
      - "selling_general_admin_expense (period=t-1)"
      - "long_term_debt (period=t)"
      - "long_term_debt (period=t-1)"
  confidence:
    min: 0.70
    max: 1.00
    rationale: |
      Microsoft is full-iXBRL; all 16 canonical line items matched
      preferred concepts with no fallbacks. Only TATA-approximation
      warning fires. Live confidence is 0.85.
  warnings_must_include:
    - "tata_approximation"

external_references:
  - source: "Beneish, M. D. (1999). The Detection of Earnings Manipulation. Financial Analysts Journal, 55(5), 24-36."
  - source: "BUILD_REFS.md §4.4"
    note: "Apple/Microsoft should both be well below either threshold; M-scores -2.5 to -3.5 are typical for modern large-caps."
  - source: "Microsoft FY2023 10-K Note 1 — accounting-policy change on server/network asset useful lives (6-year to 8-year extension)."
    note: "Explains the DEPI ~1.40 reading."

caveats: []

known_deviation_explanation: null

notes:
  source_of_expected: >-
    Live implementation (Phase 4 run). Microsoft's FY2023 useful-life
    extension on server assets is a real accounting-policy change —
    the rule template's DEPI follow-up questions would correctly
    surface this as the driver.
  data_quality_caveats:
    - "Microsoft FY2023 10-K is 9.9MB iXBRL — all line items matched preferred concepts."
    - "Fiscal year ends June 30; FY2022 is July 2021 - June 2022, FY2023 is July 2022 - June 2023."
    - "The DEPI ~1.40 reading flags in the 'high' band of m_score_components.yaml — this is expected and explainable (policy change, not manipulation)."
  last_reviewed_at: 2026-04-17
  last_reviewed_by: "evaluation_agent persona, Phase 5 gold authoring"

