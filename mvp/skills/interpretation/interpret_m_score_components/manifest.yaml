# Manifest for interpret_m_score_components — L2 interpretation skill.
# Consumes the output of compute_beneish_m_score (the 8 component values)
# and returns the per-component severity band + paper-anchored
# interpretation text, via the declarative rule template authored by
# the accounting_expert persona (Phase 3).

skill_id: interpret_m_score_components
version: 0.1.0
layer: interpretation
status: alpha
maintainer_persona: accounting_expert
description_for_llm: >-
  Interpret the eight Beneish (1999) ratio components (DSRI, GMI, AQI,
  SGI, DEPI, SGAI, LVGI, TATA) for a specific US public-company 10-K
  filing. For each component, returns the severity band that the
  component value falls into (low / medium / high / critical, or
  indeterminate_null when the component could not be computed), the
  accounting-expert-authored interpretation text for that band,
  follow-up diligence questions, and citations back to the canonical
  line items that produced the component value. Also returns a 2-4
  sentence overall narrative that names the filing and enumerates the
  flagged components. Use this after compute_beneish_m_score when an
  agent needs the "why" behind the M-score, not just the scalar.

provenance:
  source_papers: []
  # The source artefact here is the rule template YAML authored by the
  # accounting_expert persona — it is the expert-velocity track that
  # pairs with the engine. The underlying paper (Beneish 1999) is cited
  # in compute_beneish_m_score; repeating the provenance block here
  # would be redundant.

implementation_decisions:
  - decision: >-
      Thresholds and band boundaries are read at run time from
      mvp/rules/templates/m_score_components.yaml — NOT hardcoded in
      Python. Coefficients (paper constants) stay in the paper-derived
      skill compute_beneish_m_score.
    rationale: >-
      Operating Principle P1: the accounting_expert persona edits
      thresholds and interpretation prose without touching Python.
      Engineering changes do not require accounting sign-off.
    reviewer_persona: accounting_expert
  - decision: >-
      Overall interpretation is deterministic templated text — it
      names the issuer, enumerates flagged components by severity,
      flags indeterminate components, and closes with the -1.78
      threshold context. No LLM call.
    rationale: >-
      Determinism per success_criteria §4.4. §8 negative gate
      prohibits generic text; per-company specificity comes from
      substituting real line-item values (the header line the rule
      executor prepends to each component's interpretation text).
    reviewer_persona: accounting_expert
  - decision: >-
      Confidence defaults to the source_confidence passed in, capped
      at 0.7 for pre-iXBRL filings and 0.95 for iXBRL filings, minus
      0.05 per null component.
    rationale: >-
      Inherits the upstream M-score skill's confidence when the
      composite is piping values through. Standalone callers get a
      data-quality-anchored baseline. The cap is asymmetric because
      hand-authored SGML extraction carries more residual
      uncertainty than machine-extracted iXBRL.
    reviewer_persona: accounting_expert

inputs:
  type: object
  required: [cik, fiscal_year_end, components]
  additionalProperties: false
  properties:
    cik:
      type: string
      pattern: "^[0-9]{10}$"
      description: >-
        10-digit zero-padded SEC CIK for the issuer.
    fiscal_year_end:
      type: string
      description: >-
        Fiscal year end of the 'year t' 10-K filing, ISO yyyy-mm-dd.
    components:
      type: object
      description: >-
        The eight Beneish ratio components, as emitted by
        compute_beneish_m_score. Each may be a number or null (when the
        underlying canonical line items are not available).
      additionalProperties: false
      properties:
        DSRI:
          type: ["number", "null"]
          description: Days Sales in Receivables Index.
        GMI:
          type: ["number", "null"]
          description: Gross Margin Index.
        AQI:
          type: ["number", "null"]
          description: Asset Quality Index.
        SGI:
          type: ["number", "null"]
          description: Sales Growth Index.
        DEPI:
          type: ["number", "null"]
          description: Depreciation Index.
        SGAI:
          type: ["number", "null"]
          description: SG&A Index.
        LVGI:
          type: ["number", "null"]
          description: Leverage Index.
        TATA:
          type: ["number", "null"]
          description: Total Accruals to Total Assets.
    source_confidence:
      type: ["number", "null"]
      description: >-
        Optional confidence value inherited from the upstream skill
        (compute_beneish_m_score). Passed through with the pre-iXBRL /
        iXBRL cap applied.

outputs:
  type: object
  required:
    - component_interpretations
    - overall_interpretation
    - citations
    - confidence
    - warnings
  additionalProperties: true
  properties:
    component_interpretations:
      type: array
      description: >-
        One per Beneish component, in paper order (DSRI, GMI, AQI, SGI,
        DEPI, SGAI, LVGI, TATA). Each entry is a
        ComponentInterpretation — value + band_matched (condition +
        severity) + interpretation_text + follow_up_questions +
        citations + contextual_caveats.
      items:
        type: object
        description: One ComponentInterpretation record.
    overall_interpretation:
      type: string
      description: >-
        2-4 sentence deterministic summary naming the issuer,
        enumerating flagged components, and placing the M-score
        threshold context.
    citations:
      type: array
      description: >-
        Flat deduplicated list of all Citation records across the eight
        component interpretations. One Citation per underlying canonical
        line item used.
      items:
        type: object
        description: One Citation record.
    confidence:
      type: number
      description: >-
        Numeric confidence score in [0, 1], inherited from
        source_confidence and capped per data_quality_flag.
    warnings:
      type: array
      description: >-
        Zero or more warning strings — e.g. pre_ixbrl_manual_extraction
        (when any underlying statement is from the SGML fixture),
        null_components (when components cannot be computed).
      items:
        type: string
        description: One warning string.

citation_contract:
  required_per_field:
    component_interpretations: >-
      Every non-null component's interpretation carries citations to
      the canonical line items that produced the component value
      (enumerated by the rule template's citations_required list per
      band). Missing input line items surface as null components with
      a synthetic indeterminate_null band.
  hash_algorithm: sha256
  locator_format: "<cik>/<accession>::<statement_role>::<canonical_line_item_name>"

confidence:
  computed_from:
    - source_confidence (inherited from compute_beneish_m_score when piped)
    - pre_ixbrl_vs_ixbrl_cap
    - null_component_count
  calibration_status: uncalibrated_at_mvp

dependencies:
  skills:
    - skill_id: compute_beneish_m_score
      min_version: 0.1.0
  lib:
    - mvp.standardize.statements
    - mvp.engine.rule_executor
    - mvp.ingestion.filings_ingest
  rules:
    - rules/templates/m_score_components.yaml

evaluation:
  gold_standard_path: eval/gold/beneish/
  eval_metrics:
    - name: severity_matches_gold
      target: ">= 4/5 cases per component family"
    - name: citation_resolves
      target: "= 1.00"

limitations:
  - >-
    Overall interpretation is 2-4 sentences of templated text; it is
    not a discursive analyst narrative. The component-level
    interpretation_text blocks carry the depth.
  - >-
    The skill does not re-compute component values — it trusts the
    passed-in components dict. A caller passing wrong values will get
    the wrong band assignment. In practice the composite skill pipes
    compute_beneish_m_score's output directly.
  - >-
    The skill supports only the 5 MVP issuers × their two fiscal
    years. Any other (cik, fiscal_year_end) triggers an
    unknown_filing error.

examples:
  - name: "Enron FY2000 — flagged components"
    input:
      cik: "0001024401"
      fiscal_year_end: "2000-12-31"
      components:
        DSRI: 1.5
        GMI: 1.2
        AQI: 1.3
        SGI: 1.6
        DEPI: 1.0
        SGAI: 1.0
        LVGI: 1.0
        TATA: 0.05
    notes: >-
      Illustrative inputs (real values come from compute_beneish_m_score).
      With these, DSRI / GMI / AQI / SGI / TATA all land in the
      high-severity band and the overall text enumerates them.
  - name: "Carvana FY2022 — indeterminate components"
    input:
      cik: "0001690820"
      fiscal_year_end: "2022-12-31"
      components:
        DSRI: 1.16
        GMI: 1.64
        AQI: 1.23
        SGI: 1.06
        DEPI: null
        SGAI: 1.27
        LVGI: 1.21
        TATA: null
    notes: >-
      DEPI and TATA are null (EBIT-dependent / D&A-dependent line items
      missing). Output enumerates them as indeterminate and carries on
      with the six remaining components.

cost_estimate:
  llm_tokens_per_call: 0
  external_api_calls: 0
  typical_latency_ms: 150
